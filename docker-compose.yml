name: project-gl

services:
  mysql:
    image: mysql:8.0
    container_name: rpa-mysql
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: management_system
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    networks:
      rpa-network:
        aliases:
          - mysql

  agent:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: project-gl-agent:latest
    container_name: rpa-agent
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      LLM_PROTOCOL: ${LLM_PROTOCOL:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-your-api-key-here}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/v1}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AGENT_PORT:-5000}:5000"
    volumes:
      - agent_data:/app/storage
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3).read()
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      rpa-network:
        aliases:
          - agent

  spider:
    build:
      context: ./spider/spider_exc
      dockerfile: Dockerfile
      args:
        PLAYWRIGHT_BASE_IMAGE: ${SPIDER_PLAYWRIGHT_IMAGE:-mcr.microsoft.com/playwright/java:v1.40.0-jammy}
    image: project-gl-spider:latest
    container_name: rpa-spider
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: spider_db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "${SPIDER_PORT:-9081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      rpa-network:
        aliases:
          - spider

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: project-gl-backend:latest
    container_name: rpa-backend
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: management_system
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-256-bit-secret-key-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SPIDER_BASE_URL: http://spider:8081
      AGENT_BASE_URL: http://agent:5000
      BACKEND_CALLBACK_BASE: http://backend:8080
    ports:
      - "${BACKEND_PORT:-9080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      agent:
        condition: service_healthy
      spider:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      rpa-network:
        aliases:
          - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: project-gl-frontend:latest
    container_name: rpa-frontend
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      rpa-network:
        aliases:
          - frontend

volumes:
  mysql_data:
    name: project-gl_mysql_data
  agent_data:
    name: project-gl_agent_data

networks:
  rpa-network:
    name: rpa-network
