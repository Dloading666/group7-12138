spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:rpa_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  sql:
    init:
      mode: never

jwt:
  secret: test-secret-test-secret-test-secret-test-secret
  expiration: 86400000
