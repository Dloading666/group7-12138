server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: management-system

  # 数据源配置 - H2 (开发环境)
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:management_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2控制台 (仅开发环境)
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT配置
jwt:
  secret: your-secret-key-change-this-in-production-environment-at-least-256-bits
  expiration: 86400000  # 24小时 (毫秒)
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.rpa.management: DEBUG
    org.springframework.security: DEBUG
