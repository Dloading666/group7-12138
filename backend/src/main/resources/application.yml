server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rpa-backend
  profiles:
    default: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rpa?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V1__init.sql

jwt:
  secret: ${JWT_SECRET:rpa-backend-secret-change-me-rpa-backend-secret-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.rpa.management: INFO
    org.springframework.security: INFO
