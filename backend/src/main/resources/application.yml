server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rpa-backend
  profiles:
    default: mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rpa?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:rpa-backend-secret-change-me-rpa-backend-secret-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.rpa.management: INFO
    org.springframework.security: INFO
