server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: management-system

  # 数据源配置 - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/management_system?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true

  # H2控制台 (禁用)
  h2:
    console:
      enabled: false

# JWT配置
jwt:
  secret: your-secret-key-change-this-in-production-environment-at-least-256-bits
  expiration: 86400000  # 24小时 (毫秒)
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.rpa.management: DEBUG
    org.springframework.security: DEBUG
