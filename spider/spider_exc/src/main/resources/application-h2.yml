spring:
  config:
    activate:
      on-profile: h2
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:spider_db;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
